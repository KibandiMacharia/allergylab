name: AllergyLab CI/CD

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build the Docker images
        run: |
          cd part7a
          docker build -t ${{secrets.DOCKER_USERNAME}}/al-app:latest ./app
          docker build -t ${{secrets.DOCKER_USERNAME}}/al-dv-loader:latest ./db-loader
          docker build -t ${{secrets.DOCKER_USERNAME}}/al-email:latest ./app
